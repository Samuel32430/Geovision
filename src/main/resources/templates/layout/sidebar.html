<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<body>
<aside class="sidebar" th:fragment="sidebar">
    <div class="brand">
        <h1>Geo Vision</h1>
        <p>Sistema de Ventas</p>
    </div>

    <nav class="nav">
        <a th:href="@{/dashboard}" class="active">
            <span class="icon">
                <svg class="feather" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            </span>
            Inicio
        </a>
        <div class="nav-dropdown" sec:authorize="hasAuthority('MODULO_ATENCION_AL_PACIENTE')">
            <a href="#" class="dropdown-toggle" onclick="this.parentElement.classList.toggle('open'); return false;">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                Atencion al Paciente
                <svg class="feather dropdown-icon" viewBox="0 0 24 24" style="margin-left:auto; width:16px; height:16px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </a>
            <div class="dropdown-menu">
                <a th:href="@{/pacientes}" class="dropdown-item">
                    <span class="icon" style="width:12px; height:12px; border-radius:50%; background-color:#208f8c; display:inline-block; margin-right:8px;"></span>
                    Pacientes
                </a>
                <a th:href="@{/historial}" class="dropdown-item">
                    <span class="icon" style="width:12px; height:12px; border-radius:50%; background-color:#208f8c; display:inline-block; margin-right:8px;"></span>
                    Historial de Pacientes
                </a>
                <a th:href="@{/recetas/nuevo}" class="dropdown-item">
                    <span class="icon" style="width:12px; height:12px; border-radius:50%; background-color:#208f8c; display:inline-block; margin-right:8px;"></span>
                    Generar receta
                </a>
                <a th:href="@{/examenes/nuevo}" class="dropdown-item">
                    <span class="icon" style="width:12px; height:12px; border-radius:50%; background-color:#208f8c; display:inline-block; margin-right:8px;"></span>
                    Registrar examen
                </a>
                <a th:href="@{/pacientes/nuevo}" class="dropdown-item">
                    <span class="icon" style="width:12px; height:12px; border-radius:50%; background-color:#208f8c; display:inline-block; margin-right:8px;"></span>
                    Registrar paciente
                </a>
            </div>
        </div>
        <a href="#">
            <span class="icon">
                <svg class="feather" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
            </span>
            Ventas
        </a>
        <a href="#">
            <span class="icon">
                <svg class="feather" viewBox="0 0 24 24"><path d="M9 2h6v4H9z"/><path d="M12 6v8"/><circle cx="12" cy="18" r="4"/></svg>
            </span>
            Laboratorio
        </a>
        <a href="#">
            <span class="icon">
                <svg class="feather" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            </span>
            Inventario
        </a>
    </nav>

    <div class="user-card">
        <div class="avatar"></div>
        <div>
            <div class="name">Cristiano Ronaldo</div>
            <div class="role">The Goat</div>
        </div>
    </div>
</aside>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Vision - Gestión de Usuarios</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/css/pages/users.css}">
    <link rel="stylesheet" href="../../static/css/components/buttons.css">
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar">
    <div class="brand">
        <h1>Geo Vision</h1>
        <p>Sistema de Ventas</p>
    </div>

    <nav class="nav">
        <a th:href="@{/dashboard}">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                </span>
            Inicio
        </a>
        <a th:href="@{/pacientes}" sec:authorize="hasAuthority('MODULO_ATENCION_AL_PACIENTE')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
            Atencion al Paciente
        </a>
        <a href="#" sec:authorize="hasAuthority('MODULO_VENTAS')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
                </span>
            Ventas
        </a>
        <a href="#" sec:authorize="hasAuthority('MODULO_LABORATORIO')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><path d="M9 2h6v4H9z"/><path d="M12 6v8"/><circle cx="12" cy="18" r="4"/></svg>
                </span>
            Laboratorio
        </a>
        <a href="#" sec:authorize="hasAuthority('MODULO_INVENTARIO')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                </span>
            Inventario
        </a>
        <span class="nav-section-label" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">Seguridad</span>
        <a th:href="@{/seguridad}" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </span>
            Seguridad
        </a>
        <a th:href="@{/usuarios}" class="active" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M1 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
                </span>
            Gestión de Usuarios
        </a>
        <a th:href="@{/roles}" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
            Roles y Permisos
        </a>
    </nav>

    <div class="user-card">
        <div class="avatar"></div>
        <div>
            <div class="name" sec:authentication="principal.usuario.empleado.persona.nombres">Nombre</div>
            <div class="role" sec:authentication="principal.usuario.rol.nombreRol">Rol</div>
        </div>
    </div>

    <form th:action="@{/logout}" method="post" class="logout-form">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="logout-btn">Cerrar sesión</button>
    </form>
</aside>

<!-- Main -->
<main class="main">
    <div class="topbar">
        <h2>Gestión de Usuarios</h2>
        <div class="divider"></div>
        <span class="date">Módulo de Seguridad</span>
        <div class="actions">
            <a th:href="@{/usuarios/nuevo}">
                <button class="new-sale-btn">+ Registrar usuario</button>
            </a>
            <!--<a th:href="@{/usuarios/nuevo}" class="new-sale-btn">+ Registrar usuario</a>-->
        </div>
    </div>

    <div class="content">
        <div class="usr-toolbar">
            <form method="get" th:action="@{/usuarios}" class="usr-toolbar-form">
                <svg class="feather usr-toolbar-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input class="usr-toolbar-input" type="text" name="q" th:value="${q}" placeholder="Buscar por usuario o rol...">
            </form>
        </div>

        <div class="panel usr-panel">
            <table class="table usr-table">
                <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Correo</th>
                    <th>Rol</th>
                    <th>Registro</th>
                    <th>Estado</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="usuario, iter : ${usuarios}">
                    <td>
                        <div class="usr-cell-user">
                            <div class="usr-avatar" th:classappend="'usr-avatar-' + ${iter.index % 4}"
                                 th:text="${#strings.substring(usuario.empleado.persona.nombres,0,1)} + ${#strings.substring(usuario.empleado.persona.apellidos,0,1)}"></div>
                            <div>
                                <div class="usr-row-name"
                                     th:text="${usuario.empleado.persona.nombres} + ' ' + ${usuario.empleado.persona.apellidos}"></div>
                                <div class="usr-row-sub" th:text="'@' + ${usuario.usuarioLogin}"></div>
                            </div>
                        </div>
                    </td>
                    <td th:text="${usuario.empleado.persona.correo}"></td>
                    <td><span class="usr-role-badge" th:text="${usuario.rol.nombreRol}"></span></td>
                    <td th:text="${#temporals.format(usuario.fechaRegistro, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span class="usr-badge"
                              th:class="${usuario.estado == 'activo'} ? 'usr-badge usr-badge-activo' : 'usr-badge usr-badge-inactivo'">
                            <span class="usr-badge-dot"></span>
                            <span th:text="${usuario.estado}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="rol-table-actions">
                            <a class="rol-edit-link" th:href="@{/usuarios/{id}/editar(id=${usuario.id})}">Editar</a>
                            <form th:action="@{/usuarios/{id}/estado(id=${usuario.id})}" method="post" class="inline-form">
                                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="rol-toggle-btn" th:text="${usuario.estado == 'activo'} ? 'Desactivar' : 'Activar'"></button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="usr-panel-footer">
                <div class="empty" th:if="${#lists.isEmpty(usuarios)}">No hay usuarios registrados</div>
                <div class="usr-table-footer" th:unless="${#lists.isEmpty(usuarios)}"
                     th:text="'Mostrando ' + ${usuarios.size()} + ' usuario' + (${usuarios.size()} == 1 ? '' : 's')"></div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Vision - Usuario</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/css/pages/users.css}">
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar">
    <div class="brand">
        <h1>Geo Vision</h1>
        <p>Sistema de Ventas</p>
    </div>

    <nav class="nav">
        <a th:href="@{/dashboard}">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                </span>
            Inicio
        </a>
        <a th:href="@{/pacientes}" sec:authorize="hasAuthority('MODULO_ATENCION_AL_PACIENTE')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
            Atencion al Paciente
        </a>
        <a href="#" sec:authorize="hasAuthority('MODULO_VENTAS')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
                </span>
            Ventas
        </a>
        <a href="#" sec:authorize="hasAuthority('MODULO_LABORATORIO')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><path d="M9 2h6v4H9z"/><path d="M12 6v8"/><circle cx="12" cy="18" r="4"/></svg>
                </span>
            Laboratorio
        </a>
        <a href="#" sec:authorize="hasAuthority('MODULO_INVENTARIO')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                </span>
            Inventario
        </a>
        <span class="nav-section-label" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">Seguridad</span>
        <a th:href="@{/seguridad}" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </span>
            Seguridad
        </a>
        <a th:href="@{/usuarios}" class="active" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M1 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/></svg>
                </span>
            Gestión de Usuarios
        </a>
        <a th:href="@{/roles}" sec:authorize="hasAuthority('MODULO_SEGURIDAD')">
                <span class="icon">
                    <svg class="feather" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                </span>
            Roles y Permisos
        </a>
    </nav>

    <div class="user-card">
        <div class="avatar"></div>
        <div>
            <div class="name" sec:authentication="principal.usuario.empleado.persona.nombres">Nombre</div>
            <div class="role" sec:authentication="principal.usuario.rol.nombreRol">Rol</div>
        </div>
    </div>

    <form th:action="@{/logout}" method="post" class="logout-form">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="logout-btn">Cerrar sesión</button>
    </form>
</aside>

<!-- Main -->
<main class="main">
    <div class="topbar">
        <h2 th:text="${usuario.id == null} ? 'Registrar usuario' : 'Editar usuario'"></h2>
        <div class="divider"></div>
        <span class="date">Módulo de Seguridad</span>
    </div>

    <div class="content">
        <div class="panel usr-form-panel">
            <div class="usr-form-header">
                <div>
                    <h3 th:text="${usuario.id == null} ? 'Nuevo Usuario' : 'Editar Usuario'"></h3>
                    <p th:text="${usuario.id == null} ? 'Complete la información para registrar una nueva cuenta en el sistema.' : 'Actualice la información de la cuenta.'"></p>
                </div>
                <span class="usr-form-header-icon">
                    <svg class="feather lg" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M1 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
                </span>
            </div>

            <form th:object="${usuario}"
                  th:action="${usuario.id == null} ? @{/usuarios} : @{/usuarios/{id}(id=${usuario.id})}"
                  method="post" class="usr-form">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="usr-form-section">
                    <span class="usr-form-section-bar"></span>
                    <span class="usr-form-section-title">Información personal</span>
                </div>
                <div class="usr-form-grid">
                    <div class="usr-form-field">
                        <label class="login-label" for="nombres">Nombres</label>
                        <input class="login-input" type="text" id="nombres" th:field="*{empleado.persona.nombres}" placeholder="Ingrese nombres" required>
                    </div>
                    <div class="usr-form-field">
                        <label class="login-label" for="apellidos">Apellidos</label>
                        <input class="login-input" type="text" id="apellidos" th:field="*{empleado.persona.apellidos}" placeholder="Ingrese apellidos" required>
                    </div>
                    <div class="usr-form-field">
                        <label class="login-label" for="telefono">Teléfono</label>
                        <input class="login-input" type="text" id="telefono" th:field="*{empleado.persona.telefono}" placeholder="+51 900 000 000" required>
                    </div>
                    <div class="usr-form-field">
                        <label class="login-label" for="correo">Correo</label>
                        <input class="login-input" type="email" id="correo" th:field="*{empleado.persona.correo}" placeholder="usuario@geovision.com" required>
                    </div>
                </div>

                <div class="usr-form-section">
                    <span class="usr-form-section-bar"></span>
                    <span class="usr-form-section-title">Configuración de cuenta</span>
                </div>
                <div class="usr-form-grid">
                    <div class="usr-form-field">
                        <label class="login-label" for="usuarioLogin">Nombre de usuario</label>
                        <input class="login-input" type="text" id="usuarioLogin" th:field="*{usuarioLogin}" placeholder="j.perez" required>
                    </div>
                    <div class="usr-form-field">
                        <label class="login-label" for="cargo">Cargo</label>
                        <input class="login-input" type="text" id="cargo" th:field="*{empleado.cargo}" placeholder="Ej. Analista de Ventas" required>
                    </div>
                    <div class="usr-form-field">
                        <label class="login-label" for="fechaIngreso">Fecha de ingreso</label>
                        <input class="login-input" type="date" id="fechaIngreso" th:field="*{empleado.fechaIngreso}" required>
                    </div>
                    <div class="usr-form-field">
                        <th:block th:if="${usuario.id == null}">
                            <label class="login-label" for="contrasenaInicial">Contraseña inicial</label>
                            <div class="usr-password-wrap">
                                <input class="login-input" type="password" id="contrasenaInicial" name="contrasenaInicial" minlength="6" required>
                                <button type="button" class="usr-password-toggle" onclick="toggleUsrPassword('contrasenaInicial', this)">
                                    <svg class="feather" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </th:block>
                        <th:block th:unless="${usuario.id == null}">
                            <label class="login-label" for="nuevaContrasena">Nueva contraseña (opcional)</label>
                            <div class="usr-password-wrap">
                                <input class="login-input" type="password" id="nuevaContrasena" name="nuevaContrasena" minlength="6" placeholder="Mínimo 6 caracteres">
                                <button type="button" class="usr-password-toggle" onclick="toggleUsrPassword('nuevaContrasena', this)">
                                    <svg class="feather" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                </button>
                            </div>
                        </th:block>
                    </div>
                    <div class="usr-form-field">
                        <label class="login-label" for="idRol">Rol</label>
                        <select class="login-input" id="idRol" name="idRol" required>
                            <option value="">Seleccione un rol</option>
                            <option th:each="rol : ${roles}" th:value="${rol.id}"
                                    th:selected="${usuario.rol != null and usuario.rol.id == rol.id}"
                                    th:text="${rol.nombreRol}"></option>
                        </select>
                    </div>
                    <div class="usr-form-field">
                        <label class="login-label">Estado</label>
                        <div class="usr-estado-toggle">
                            <label class="usr-estado-option">
                                <input type="radio" th:field="*{estado}" value="activo">
                                <span class="usr-estado-dot"></span> Activo
                                <span class="usr-estado-check">✓</span>
                            </label>
                            <label class="usr-estado-option user-stado-inactivo">
                                <input type="radio" th:field="*{estado}" value="inactivo">
                                <span class="usr-estado-dot"></span> Inactivo
                                <span class="usr-estado-check">✓</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="usr-form-footer">
                    <button type="submit" class="new-sale-btn">
                        <svg class="feather" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Guardar
                    </button>
                    <a th:href="@{/usuarios}" class="form-cancel">Cancelar</a>
                    <span class="usr-form-hint">
                        <svg class="feather" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                        Todos los campos son obligatorios
                    </span>
                </div>
            </form>
        </div>
    </div>
</main>
<script>
    function toggleUsrPassword(inputId, btn) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.classList.toggle('usr-password-toggle-active');
    }
</script>
</body>
</html>

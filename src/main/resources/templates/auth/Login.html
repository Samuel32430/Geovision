<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Vision - Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body class="login-body">
<div class="login-card">
    <div class="brand">
        <h1>Geo Vision</h1>
        <p>Sistema de Ventas</p>
    </div>

    <form th:action="@{/login}" method="post" class="login-form">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <p class="login-error" th:if="${param.error}">Usuario o contraseña incorrectos.</p>
        <p class="login-info" th:if="${param.logout}">Sesión cerrada correctamente.</p>

        <label class="login-label" for="username">Usuario</label>
        <input class="login-input" type="text" id="username" name="username" autocomplete="username" required autofocus>

        <label class="login-label" for="password">Contraseña</label>
        <input class="login-input" type="password" id="password" name="password" autocomplete="current-password" required>

        <button type="submit" class="new-sale-btn login-submit">Ingresar</button>
    </form>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo Vision - Iniciar sesión</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>
<body class="login-body">
<div class="login-card">
    <div class="brand">
        <h1>Geo Vision</h1>
        <p>Sistema de Ventas</p>
    </div>

    <form th:action="@{/login}" method="post" class="login-form">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <p class="login-error" th:if="${param.error}">Usuario o contraseña incorrectos.</p>
        <p class="login-info" th:if="${param.logout}">Sesión cerrada correctamente.</p>

        <label class="login-label" for="username">Usuario</label>
        <input class="login-input" type="text" id="username" name="username" autocomplete="username" required autofocus>

        <label class="login-label" for="password">Contraseña</label>
        <div class="usr-password-wrap">
            <input class="login-input" type="password" id="password" name="password" minlength="6" required>
            <button type="button" class="usr-password-toggle" onclick="toggleUsrPassword('password', this)">
                <svg class="feather" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>


        <button type="submit" class="new-sale-btn login-submit">Ingresar</button>
    </form>
</div>
<script>
    function toggleUsrPassword(inputId, btn) {
        const input = document.getElementById(inputId);
        input.type = input.type === 'password' ? 'text' : 'password';
        btn.classList.toggle('usr-password-toggle-active');
    }
</script>
</body>
</html>
